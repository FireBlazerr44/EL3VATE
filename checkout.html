<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - EL3VATE</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="checkout-body">
    <header class="header">
        <div class="header-left">
            <a href="index.html" class="logo">EL3VATE</a>
        </div>
        <div class="header-right">
            <a href="index.html" class="back-to-shop">Back to Shop</a>
        </div>
    </header>

    <main class="checkout-main">
        <div class="checkout-container">
            <div class="checkout-form-section">
                <h1>CHECKOUT</h1>
                
                <form id="checkout-form">
                    <div class="form-section">
                        <h3>Contact Information</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="first-name" placeholder=" " required>
                                <label for="first-name">First Name</label>
                            </div>
                            <div class="form-group">
                                <input type="text" id="last-name" placeholder=" " required>
                                <label for="last-name">Last Name</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <input type="email" id="email" placeholder=" " required>
                            <label for="email">Email</label>
                        </div>
                        <div class="form-group">
                            <input type="tel" id="phone" placeholder=" " required>
                            <label for="phone">Phone</label>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Shipping Address</h3>
                        <div class="form-group">
                            <input type="text" id="address" placeholder=" " required>
                            <label for="address">Address</label>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="city" placeholder=" " required>
                                <label for="city">City</label>
                            </div>
                            <div class="form-group">
                                <input type="text" id="postal-code" placeholder=" " required>
                                <label for="postal-code">Postal Code</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <input type="text" id="country" placeholder=" " required>
                            <label for="country">Country</label>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3>Payment</h3>
                        <div class="form-group">
                            <input type="text" id="card-number" placeholder=" " required maxlength="19">
                            <label for="card-number">Card Number</label>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="expiry" placeholder=" " required maxlength="5">
                                <label for="expiry">MM/YY</label>
                            </div>
                            <div class="form-group">
                                <input type="text" id="cvv" placeholder=" " required maxlength="3">
                                <label for="cvv">CVV</label>
                            </div>
                        </div>
                        <div class="form-group">
                            <input type="text" id="card-name" placeholder=" " required>
                            <label for="card-name">Name on Card</label>
                        </div>
                    </div>

                    <button type="submit" class="place-order-btn">PLACE ORDER</button>
                </form>
            </div>

            <div class="checkout-summary-section">
                <h3>Order Summary</h3>
                <div class="promo-input">
                    <input type="text" id="promo-code" placeholder="Promo code">
                    <button id="apply-promo">Apply</button>
                </div>
                <div id="promo-message"></div>
                <div class="checkout-items" id="checkout-items">
                </div>
                <div class="checkout-totals">
                    <div class="checkout-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">$0.00</span>
                    </div>
                    <div class="checkout-row discount" id="discount-row" style="display: none;">
                        <span>Discount (10%)</span>
                        <span id="checkout-discount">-$0.00</span>
                    </div>
                    <div class="checkout-row">
                        <span>Shipping</span>
                        <span>Free</span>
                    </div>
                    <div class="checkout-row total">
                        <span>Total</span>
                        <span id="checkout-total">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast">Order placed successfully!</div>

    <script src="products.js"></script>
    <script src="checkout.js"></script>
</body>
</html>
